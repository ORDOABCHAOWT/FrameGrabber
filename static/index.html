<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrameGrabber</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.07);
  --border: rgba(255,255,255,0.08);
  --border-light: rgba(255,255,255,0.12);
  --border-accent: rgba(124,107,245,0.4);
  --text: #e8e8ed;
  --text-dim: rgba(255,255,255,0.45);
  --text-muted: rgba(255,255,255,0.25);
  --accent: #7c6bf5;
  --accent-glow: rgba(124,107,245,0.3);
  --green: #34d399;
  --green-glow: rgba(52,211,153,0.25);
  --radius-sm: 10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  top: -40%; left: -20%;
  width: 80%; height: 80%;
  background: radial-gradient(ellipse, rgba(124,107,245,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -30%; right: -10%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(52,211,153,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.app {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 300px;
  grid-template-rows: auto 1fr auto;
  height: 100vh;
}

/* ── Header ───────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: center;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(40px);
  -webkit-backdrop-filter: blur(40px);
  background: rgba(10,10,15,0.7);
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-right: 24px;
}

.logo-icon {
  width: 30px; height: 30px;
  border-radius: 8px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
  box-shadow: 0 0 20px var(--accent-glow);
}

.logo-text { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }

.header-info { flex: 1; display: flex; align-items: center; gap: 16px; }

.file-name {
  font-size: 13px; color: var(--text-dim);
  max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.header-badges { display: flex; gap: 8px; }

.badge {
  display: none; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 6px;
  background: var(--surface); border: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); font-variant-numeric: tabular-nums;
}

.badge.visible { display: flex; }

.badge-label {
  color: var(--text-muted); text-transform: uppercase;
  font-size: 9px; letter-spacing: 0.5px;
}

/* ── Preview ──────────────────────────────────── */
.preview-area {
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3);
}

.preview-media {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain; opacity: 0;
  transition: opacity 0.15s;
  pointer-events: none;
}

.preview-media.visible { opacity: 1; }
.preview-area img.preview-media.visible.loaded { opacity: 1; }

.drop-zone {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; transition: opacity 0.3s; z-index: 5;
}

.drop-zone.hidden { opacity: 0; pointer-events: none; }

.drop-icon {
  width: 80px; height: 80px; border-radius: 22px;
  border: 2px dashed rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; color: var(--text-muted); transition: all 0.3s;
}

.drop-zone.drag-over .drop-icon {
  border-color: var(--accent); color: var(--accent);
  background: rgba(124,107,245,0.08); transform: scale(1.05);
}

.drop-text { font-size: 15px; color: var(--text-dim); text-align: center; line-height: 1.6; }
.drop-sub { font-size: 12px; color: var(--text-muted); }

.drop-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 28px; border: 1px solid var(--border-light);
  border-radius: 12px; background: var(--surface-hover);
  color: var(--text); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; font-family: inherit; margin-top: 4px;
}

.drop-btn:hover {
  background: var(--accent); border-color: var(--accent);
  box-shadow: 0 0 24px var(--accent-glow);
}

/* ── Drag overlay ─────────────────────────────── */
.drag-overlay {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}

.drag-overlay.visible { opacity: 1; pointer-events: auto; }

.drag-overlay-content { display: flex; flex-direction: column; align-items: center; gap: 12px; }

.drag-overlay-icon {
  width: 64px; height: 64px; border-radius: 18px;
  border: 2px dashed var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; color: var(--accent); background: rgba(124,107,245,0.1);
}

.drag-overlay-text { font-size: 15px; color: var(--text-dim); }

/* ── Progress bar ─────────────────────────────── */
.import-progress {
  position: absolute; bottom: 0; left: 0; right: 0;
  z-index: 20; padding: 16px 24px;
  background: rgba(10,10,15,0.9);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border-top: 1px solid var(--border);
  transform: translateY(100%); opacity: 0;
  transition: all 0.3s;
}

.import-progress.visible { transform: translateY(0); opacity: 1; }

.import-progress-label {
  font-size: 12px; color: var(--text-dim); margin-bottom: 8px;
  display: flex; justify-content: space-between;
}

.import-progress-track {
  width: 100%; height: 4px;
  background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden;
}

.import-progress-fill {
  height: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  transition: width 0.3s;
  width: 0%;
}

/* ── Side Panel ───────────────────────────────── */
.side-panel {
  border-left: 1px solid var(--border);
  background: rgba(10,10,15,0.6);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
  display: flex; flex-direction: column; overflow: hidden;
}

.panel-section { padding: 16px; border-bottom: 1px solid var(--border); }
.panel-section:last-child { border-bottom: none; }

.panel-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: var(--text-muted); margin-bottom: 12px;
  display: flex; align-items: center; justify-content: space-between;
}

.panel-title-action {
  font-size: 11px; font-weight: 400; text-transform: none;
  letter-spacing: 0; color: var(--accent); cursor: pointer; transition: opacity 0.2s;
}

.panel-title-action:hover { opacity: 0.7; }

/* ── Video List ───────────────────────────────── */
.video-list-section { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

.video-list { flex: 1; overflow-y: auto; padding: 0 16px 16px; }

.video-list::-webkit-scrollbar { width: 4px; }
.video-list::-webkit-scrollbar-track { background: transparent; }
.video-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.video-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border: 1px solid var(--border);
  border-radius: var(--radius-sm); background: var(--surface);
  cursor: pointer; transition: all 0.15s;
  margin-bottom: 6px; position: relative;
}

.video-item:hover { background: var(--surface-hover); border-color: var(--border-light); }
.video-item.active { border-color: var(--border-accent); background: rgba(124,107,245,0.08); }

.video-thumb {
  width: 56px; height: 36px; border-radius: 6px;
  background: rgba(0,0,0,0.4); object-fit: cover; flex-shrink: 0;
}

.video-item-info { flex: 1; min-width: 0; }

.video-item-name {
  font-size: 12px; font-weight: 500; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.video-item-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

.video-item-remove {
  position: absolute; top: 4px; right: 6px;
  width: 18px; height: 18px; border-radius: 50%;
  background: transparent; border: none;
  color: var(--text-muted); font-size: 12px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  opacity: 0; transition: all 0.15s;
}

.video-item:hover .video-item-remove { opacity: 1; }
.video-item-remove:hover { background: rgba(239,68,68,0.2); color: #ef4444; }

.video-list-empty {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px 16px; color: var(--text-muted);
  font-size: 12px; text-align: center; line-height: 1.6;
}

/* ── Info Cards ───────────────────────────────── */
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }

.info-card {
  padding: 8px 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
}

.info-card.full { grid-column: 1 / -1; }

.info-label {
  font-size: 9px; text-transform: uppercase;
  letter-spacing: 0.8px; color: var(--text-muted); margin-bottom: 3px;
}

.info-value {
  font-size: 15px; font-weight: 600;
  letter-spacing: -0.3px; font-variant-numeric: tabular-nums;
}

.info-value.small { font-size: 12px; font-weight: 500; }

/* ── Grab Section ─────────────────────────────── */
.grab-section { padding: 16px; border-top: 1px solid var(--border); margin-top: auto; }

.grab-btn {
  width: 100%; padding: 12px; border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--green), #2dd4a0);
  color: #0a0a0f; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
  font-family: inherit; letter-spacing: -0.2px;
}

.grab-btn:hover { box-shadow: 0 0 30px var(--green-glow); transform: translateY(-1px); }
.grab-btn:active { transform: translateY(0); }
.grab-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }

.save-path {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; font-size: 11px; color: var(--text-muted);
  cursor: pointer; transition: all 0.2s;
}

.save-path:hover { border-color: var(--border-light); color: var(--text-dim); }

.grab-count {
  display: flex; align-items: center; gap: 6px;
  padding: 6px 10px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 8px;
  font-size: 11px; color: var(--text-dim); margin-top: 8px;
}

.grab-count-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px var(--green-glow);
}

/* ── Toast ────────────────────────────────────── */
.toast {
  position: fixed; top: 20px; right: 20px;
  padding: 12px 20px; border-radius: var(--radius-sm);
  background: rgba(52,211,153,0.15); border: 1px solid rgba(52,211,153,0.3);
  color: var(--green); font-size: 13px; font-weight: 500;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  transform: translateY(-20px); opacity: 0;
  transition: all 0.3s; z-index: 100; pointer-events: none; max-width: 400px;
}

.toast.show { transform: translateY(0); opacity: 1; }

/* ── Bottom Bar ───────────────────────────────── */
.bottom-bar {
  grid-column: 1 / -1;
  padding: 0 24px 14px;
  border-top: 1px solid var(--border);
  background: rgba(10,10,15,0.8);
  backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
}

.timeline { padding: 14px 0 8px; }

.timeline-track {
  position: relative; width: 100%; height: 6px;
  background: rgba(255,255,255,0.08); border-radius: 3px;
  cursor: pointer; transition: height 0.15s;
}

.timeline-track:hover { height: 10px; }

.timeline-fill {
  position: absolute; left: 0; top: 0; height: 100%;
  background: linear-gradient(90deg, var(--accent), #a78bfa);
  border-radius: 3px; pointer-events: none;
}

.timeline-thumb {
  position: absolute; top: 50%;
  width: 16px; height: 16px; border-radius: 50%;
  background: white; border: 2px solid var(--accent);
  transform: translate(-50%, -50%);
  cursor: grab; box-shadow: 0 0 12px var(--accent-glow);
  transition: transform 0.1s; z-index: 2;
}

.timeline-thumb:hover { transform: translate(-50%, -50%) scale(1.2); }

.timeline-hover-preview {
  position: absolute; bottom: 24px; transform: translateX(-50%);
  padding: 4px 10px; background: rgba(0,0,0,0.85);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 11px; color: var(--text); font-variant-numeric: tabular-nums;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
  white-space: nowrap; z-index: 3;
}

.timeline-track:hover .timeline-hover-preview { opacity: 1; }

.controls-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
}

.time-display { display: flex; align-items: baseline; gap: 6px; font-variant-numeric: tabular-nums; }
.time-current { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
.time-sep { color: var(--text-muted); font-size: 13px; }
.time-total { font-size: 13px; color: var(--text-dim); }

.transport-controls {
  display: flex; align-items: center; gap: 10px;
  margin-left: 18px; flex: 1;
}

.exposure-controls {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--surface);
  min-width: 280px;
}

.exposure-label {
  font-size: 11px; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.7px;
}

.exposure-slider {
  flex: 1;
  accent-color: var(--accent);
}

.exposure-value {
  font-size: 12px; min-width: 36px;
  color: var(--text); font-variant-numeric: tabular-nums;
}

.exposure-reset {
  border: 1px solid var(--border-light);
  background: transparent; color: var(--text-dim);
  border-radius: 999px; padding: 4px 10px;
  font-size: 11px; cursor: pointer; font-family: inherit;
}

.exposure-reset:hover {
  border-color: var(--accent); color: var(--text);
}

.transport-btn {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 100px; height: 36px; padding: 0 14px;
  border: 1px solid var(--border-light); border-radius: 999px;
  background: var(--surface-hover); color: var(--text);
  font-size: 12px; font-weight: 600; letter-spacing: -0.2px;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
}

.transport-btn:hover:not(:disabled) {
  border-color: var(--accent); box-shadow: 0 0 18px var(--accent-glow);
}

.transport-btn:disabled {
  opacity: 0.35; cursor: not-allowed; box-shadow: none;
}

.play-status {
  font-size: 11px; color: var(--text-dim);
  padding: 6px 10px; border-radius: 999px;
  border: 1px solid var(--border); background: var(--surface);
}

.shortcuts { font-size: 11px; color: var(--text-muted); display: flex; gap: 14px; }

.shortcut-key {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 20px; height: 20px; padding: 0 5px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; font-size: 10px; color: var(--text-dim); margin-right: 4px;
}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo">
      <div class="logo-icon">▶</div>
      <span class="logo-text">FrameGrabber</span>
    </div>
    <div class="header-info">
      <span class="file-name" id="fileName"></span>
      <div class="header-badges">
        <div class="badge" id="badgeRes"><span class="badge-label">RES</span><span id="badgeResVal">—</span></div>
        <div class="badge" id="badgeFps"><span class="badge-label">FPS</span><span id="badgeFpsVal">—</span></div>
        <div class="badge" id="badgeCodec"><span class="badge-label">CODEC</span><span id="badgeCodecVal">—</span></div>
      </div>
    </div>
  </div>

  <div class="preview-area" id="previewArea">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">◇</div>
      <div class="drop-text">拖入视频文件到此处</div>
      <div class="drop-sub">支持 MP4 / MOV / MKV / AVI / WebM / ProRes</div>
      <button class="drop-btn" onclick="chooseFile()">打开视频</button>
    </div>
    <video id="previewVideo" class="preview-media" playsinline muted preload="metadata"></video>
    <img id="previewImg" class="preview-media" src="" alt="">
    <div class="drag-overlay" id="dragOverlay">
      <div class="drag-overlay-content">
        <div class="drag-overlay-icon">+</div>
        <div class="drag-overlay-text">释放以添加视频</div>
      </div>
    </div>
    <div class="import-progress" id="importProgress">
      <div class="import-progress-label">
        <span id="importLabel">正在导入...</span>
        <span id="importPct">0%</span>
      </div>
      <div class="import-progress-track">
        <div class="import-progress-fill" id="importFill"></div>
      </div>
    </div>
  </div>

  <div class="side-panel">
    <div class="panel-section" id="infoSection" style="display:none;">
      <div class="panel-title">当前视频</div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-label">分辨率</div>
          <div class="info-value small" id="infoRes">—</div>
        </div>
        <div class="info-card">
          <div class="info-label">帧率</div>
          <div class="info-value small" id="infoFps">—</div>
        </div>
        <div class="info-card">
          <div class="info-label">编码</div>
          <div class="info-value small" id="infoCodec">—</div>
        </div>
        <div class="info-card">
          <div class="info-label">时长</div>
          <div class="info-value small" id="infoDuration">—</div>
        </div>
        <div class="info-card full">
          <div class="info-label">时间码</div>
          <div class="info-value" id="infoTimecode" style="font-size:17px;">00:00:00.000</div>
        </div>
      </div>
    </div>

    <div class="panel-section video-list-section">
      <div class="panel-title" style="padding: 0 16px; padding-top: 0;">
        <span>视频列表</span>
        <span class="panel-title-action" onclick="chooseFile()">+ 添加</span>
      </div>
      <div class="video-list" id="videoList">
        <div class="video-list-empty" id="videoListEmpty">
          拖入或打开视频文件<br>支持同时导入多个视频
        </div>
      </div>
    </div>

    <div class="grab-section">
      <button class="grab-btn" id="grabBtn" onclick="grabFrame()" disabled>截取当前帧 (PNG)</button>
      <div class="save-path" onclick="chooseSaveDir()">
        <span>保存到</span>
        <span id="saveDir">桌面</span>
      </div>
      <div class="grab-count" id="grabCount" style="display:none;">
        <div class="grab-count-dot"></div>
        <span id="grabCountText">已截取 0 帧</span>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="timeline">
      <div class="timeline-track" id="timeline">
        <div class="timeline-fill" id="timelineFill"></div>
        <div class="timeline-thumb" id="timelineThumb" style="left:0%"></div>
        <div class="timeline-hover-preview" id="timelineHover">00:00:00.000</div>
      </div>
    </div>
      <div class="controls-row">
      <div class="time-display">
        <span class="time-current" id="timeCurrent">00:00:00.000</span>
        <span class="time-sep">/</span>
        <span class="time-total" id="timeTotal">00:00:00.000</span>
      </div>
      <div class="transport-controls">
        <button class="transport-btn" id="playBtn" onclick="togglePlayback()" disabled>播放预览</button>
        <span class="play-status" id="playStatus">未载入</span>
      </div>
      <div class="exposure-controls">
        <span class="exposure-label">曝光</span>
        <input class="exposure-slider" id="exposureSlider" type="range" min="-1" max="1" step="0.1" value="0">
        <span class="exposure-value" id="exposureValue">0.0</span>
        <button class="exposure-reset" id="exposureReset" type="button" onclick="resetExposure()">重置</button>
      </div>
      <div class="shortcuts">
        <span><span class="shortcut-key">←</span><span class="shortcut-key">→</span> 逐帧</span>
        <span><span class="shortcut-key">Space</span> 播放/暂停</span>
        <span><span class="shortcut-key">Enter</span> 截取</span>
        <span><span class="shortcut-key">⌘O</span> 打开</span>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/static/playback_scheduler.js"></script>
<script>
// ── State ──────────────────────────────────────
let videos = {};
let activeId = null;
let currentTime = 0;
let seekDebounce = null;
let isDragging = false;
let bodyDragCounter = 0;
let pendingFrameLoad = null; // abort controller for cancelling stale frame loads
let frameLoadId = 0;         // monotonic id to discard stale responses
let currentPreviewUrl = null;
let heartbeatTimer = null;
let isPlaying = false;
let deferredPlaybackTime = null;
let playbackAnimationFrame = null;
let currentVideoSourceId = null;
let exposureValue = 0;
let previewVideoSourceError = false;
let dragMoveRafId = null;
let pendingDragEvent = null;
let scrubPreviewActive = false;
let scrubSettleTimer = null;

const $ = id => document.getElementById(id);
const previewImg = $('previewImg');
const previewVideo = $('previewVideo');
const dropZone = $('dropZone');
const dragOverlay = $('dragOverlay');
const timeline = $('timeline');
const timelineFill = $('timelineFill');
const timelineThumb = $('timelineThumb');
const timelineHover = $('timelineHover');
const { getPreviewRequestPlan, getVideoSelectionPlan, getCaptureTime } = window.FrameGrabberPlaybackScheduler;

function formatTime(sec) {
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = Math.floor(sec % 60);
  const ms = Math.floor((sec % 1) * 1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(3,'0')}`;
}

function activeVideo() {
  return activeId !== null ? videos[String(activeId)] : null;
}

function clampTime(t, v = activeVideo()) {
  if (!v) return 0;
  return Math.max(0, Math.min(t, v.duration));
}

function updateTimelineUI(t) {
  const v = activeVideo();
  currentTime = clampTime(t, v);
  const pct = v && v.duration > 0 ? (currentTime / v.duration) * 100 : 0;
  timelineFill.style.width = pct + '%';
  timelineThumb.style.left = pct + '%';
  $('timeCurrent').textContent = formatTime(currentTime);
  $('infoTimecode').textContent = formatTime(currentTime);
}

function formatExposure(value) {
  return value > 0 ? `+${value.toFixed(1)}` : value.toFixed(1);
}

function getPreviewBrightness() {
  return Math.max(0.35, 1 + exposureValue * 0.45);
}

function applyPreviewExposure() {
  const filter = `brightness(${getPreviewBrightness().toFixed(3)})`;
  previewImg.style.filter = filter;
  previewVideo.style.filter = filter;
  $('exposureSlider').value = exposureValue.toFixed(1);
  $('exposureValue').textContent = formatExposure(exposureValue);
}

function setExposure(nextValue, { refreshPausedPreview = true } = {}) {
  const parsed = Number.parseFloat(nextValue);
  exposureValue = Number.isFinite(parsed) ? Math.max(-1, Math.min(1, parsed)) : 0;
  applyPreviewExposure();
  if (refreshPausedPreview && activeVideo() && !isPlaying) {
    seekTo(currentTime, { skipPause: true });
  }
}

function resetExposure() {
  setExposure(0);
}

function showVideoPreview() {
  previewVideo.classList.add('visible');
  previewImg.classList.remove('visible');
  previewImg.classList.remove('loaded');
}

function showImagePreview() {
  previewVideo.classList.remove('visible');
  if (previewImg.src) {
    previewImg.classList.add('visible');
  }
}

function clearPreviewVideoSource() {
  currentVideoSourceId = null;
  previewVideoSourceError = false;
  scrubPreviewActive = false;
  previewVideo.pause();
  previewVideo.removeAttribute('src');
  previewVideo.load();
}

function ensurePreviewVideoSource(targetId = activeId, { forceReload = false } = {}) {
  if (targetId === null) return false;
  const nextSrc = `/api/video?vid=${targetId}`;
  if (!forceReload && currentVideoSourceId === targetId && previewVideo.getAttribute('src') === nextSrc) {
    return false;
  }
  if (forceReload) {
    previewVideo.pause();
    previewVideo.removeAttribute('src');
    previewVideo.load();
  }
  previewVideoSourceError = false;
  previewVideo.src = nextSrc;
  currentVideoSourceId = targetId;
  return true;
}

async function primePreviewVideo() {
  ensurePreviewVideoSource(activeId, { forceReload: previewVideoSourceError });
  if (previewVideo.readyState < 1) {
    await new Promise((resolve, reject) => {
      const onLoaded = () => {
        cleanup();
        resolve();
      };
      const onError = () => {
        cleanup();
        reject(new Error('视频载入失败'));
      };
      const cleanup = () => {
        previewVideo.removeEventListener('loadedmetadata', onLoaded);
        previewVideo.removeEventListener('error', onError);
      };

      previewVideo.addEventListener('loadedmetadata', onLoaded, { once: true });
      previewVideo.addEventListener('error', onError, { once: true });
    });
  }

  previewVideo.currentTime = clampTime(currentTime);
}

function revokePreviewUrl() {
  if (currentPreviewUrl) {
    URL.revokeObjectURL(currentPreviewUrl);
    currentPreviewUrl = null;
  }
}

function pingApp() {
  fetch('/api/ping', {
    method: 'POST',
    keepalive: true
  }).catch(() => {});
}

function startHeartbeat() {
  pingApp();
  clearInterval(heartbeatTimer);
  heartbeatTimer = setInterval(pingApp, 1500);
}

function updatePlaybackUI() {
  const hasVideo = !!activeVideo();
  $('playBtn').disabled = !hasVideo;
  if (!hasVideo) {
    $('playBtn').textContent = '播放预览';
    $('playStatus').textContent = '未载入';
    return;
  }
  $('playBtn').textContent = isPlaying ? '暂停预览' : '播放预览';
  $('playStatus').textContent = isPlaying ? '播放中' : '已暂停';
}

function stopPlaybackSyncLoop() {
  if (playbackAnimationFrame !== null) {
    cancelAnimationFrame(playbackAnimationFrame);
    playbackAnimationFrame = null;
  }
}

function syncTimelineFromVideo() {
  if (!isPlaying) return;
  updateTimelineUI(previewVideo.currentTime);
  playbackAnimationFrame = requestAnimationFrame(syncTimelineFromVideo);
}

function pausePlayback({ syncFrame = true, targetTime = null } = {}) {
  if (!activeVideo()) return;
  if (!previewVideo.paused) {
    previewVideo.pause();
  }
  stopPlaybackSyncLoop();
  isPlaying = false;
  deferredPlaybackTime = null;
  updatePlaybackUI();

  if (!syncFrame) return;

  const pauseTime = clampTime(
    targetTime !== null ? targetTime : previewVideo.currentTime,
    activeVideo()
  );
  updateTimelineUI(pauseTime);
  seekTo(pauseTime, { skipPause: true, swapPreviewAfterLoad: true });
}

async function startPlayback() {
  const v = activeVideo();
  if (!v) return;

  if (currentTime >= v.duration) {
    updateTimelineUI(0);
  }

  if (pendingFrameLoad) {
    pendingFrameLoad.abort();
    pendingFrameLoad = null;
  }
  clearTimeout(seekDebounce);

  try {
    await primePreviewVideo();
    showVideoPreview();
    isPlaying = true;
    updatePlaybackUI();
    syncTimelineFromVideo();
    await previewVideo.play();
  } catch (err) {
    stopPlaybackSyncLoop();
    isPlaying = false;
    updatePlaybackUI();
    showImagePreview();
    showToast('播放失败: ' + err.message, true);
  }
}

function togglePlayback() {
  if (!activeVideo()) return;
  if (isPlaying) {
    pausePlayback();
    return;
  }
  startPlayback();
}

// ── Import Progress ────────────────────────────
function showProgress(label, pct) {
  const el = $('importProgress');
  $('importLabel').textContent = label;
  $('importPct').textContent = Math.round(pct) + '%';
  $('importFill').style.width = pct + '%';
  el.classList.add('visible');
}

function hideProgress() {
  $('importProgress').classList.remove('visible');
}

// ── File Handling ──────────────────────────────
async function chooseFile() {
  showToast('正在打开文件选择器...');
  try {
    const res = await fetch('/api/choose', { method: 'POST' });
    const data = await res.json();
    if (data.paths && data.paths.length > 0) {
      await addVideosByPath(data.paths);
    } else {
      showToast('未选择文件', true);
    }
  } catch (e) {
    showToast('打开失败: ' + e.message, true);
  }
}

async function addVideosByPath(paths) {
  showProgress(`正在导入 ${paths.length} 个视频...`, 50);

  try {
    const res = await fetch('/api/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paths })
    });
    const data = await res.json();
    hideProgress();

    if (data.error) {
      showToast('导入失败: ' + data.error, true);
      return;
    }

    if (data.added && data.added.length > 0) {
      for (const v of data.added) {
        videos[String(v.id)] = v;
      }
      const selectId = data.active !== null ? data.active : data.added[0].id;
      await selectVideo(selectId);
      renderVideoList();
      showToast(`已添加 ${data.added.length} 个视频`);
    } else {
      showToast('没有可导入的视频', true);
    }
  } catch (e) {
    hideProgress();
    showToast('导入失败: ' + e.message, true);
  }
}

async function selectVideo(id) {
  id = Number(id);
  const res = await fetch('/api/select', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  const data = await res.json();
  if (data.error) return;

  pausePlayback({ syncFrame: false });
  activeId = id;
  const v = videos[String(id)];
  updateTimelineUI(0);
  previewImg.classList.remove('loaded');
  previewImg.classList.remove('visible');
  previewVideo.classList.remove('visible');
  revokePreviewUrl();
  previewImg.src = '';

  const selectionPlan = getVideoSelectionPlan({
    hasPreparedVideoSource: currentVideoSourceId === id,
    hasVideoSourceError: previewVideoSourceError,
  });
  if (selectionPlan.shouldPrimeVideoSource) {
    ensurePreviewVideoSource(id, { forceReload: selectionPlan.shouldReloadPreparedSource });
  }

  $('fileName').textContent = v.filename;
  $('badgeRes').classList.add('visible');
  $('badgeResVal').textContent = `${v.width}×${v.height}`;
  $('badgeFps').classList.add('visible');
  $('badgeFpsVal').textContent = v.fps;
  $('badgeCodec').classList.add('visible');
  $('badgeCodecVal').textContent = v.codec.toUpperCase();

  $('infoSection').style.display = '';
  $('infoRes').textContent = `${v.width}×${v.height}`;
  $('infoFps').textContent = `${v.fps} fps`;
  $('infoCodec').textContent = v.codec.toUpperCase();
  $('infoDuration').textContent = formatTime(v.duration);
  $('timeTotal').textContent = formatTime(v.duration);
  $('grabBtn').disabled = false;
  updatePlaybackUI();

  dropZone.classList.add('hidden');
  renderVideoList();
  if (selectionPlan.shouldLoadStillPreview) {
    seekTo(0, { skipPause: true });
  }
}

async function removeVideo(id, e) {
  if (e) e.stopPropagation();
  id = Number(id);
  const res = await fetch('/api/remove', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ id })
  });
  const data = await res.json();
  delete videos[String(id)];
  activeId = data.active;
  pausePlayback({ syncFrame: false });

  if (activeId !== null) {
    await selectVideo(activeId);
  } else {
    resetUI();
  }
  renderVideoList();
}

function resetUI() {
  pausePlayback({ syncFrame: false });
  if (pendingFrameLoad) {
    pendingFrameLoad.abort();
    pendingFrameLoad = null;
  }
  $('fileName').textContent = '';
  ['badgeRes','badgeFps','badgeCodec'].forEach(b => $(b).classList.remove('visible'));
  $('infoSection').style.display = 'none';
  $('timeTotal').textContent = '00:00:00.000';
  $('timeCurrent').textContent = '00:00:00.000';
  $('infoTimecode').textContent = '00:00:00.000';
  timelineFill.style.width = '0%';
  timelineThumb.style.left = '0%';
  previewImg.classList.remove('loaded');
  previewImg.classList.remove('visible');
  previewVideo.classList.remove('visible');
  revokePreviewUrl();
  previewImg.src = '';
  clearPreviewVideoSource();
  activeId = null;
  currentTime = 0;
  $('grabBtn').disabled = true;
  dropZone.classList.remove('hidden');
  updatePlaybackUI();
}

// ── Video List ─────────────────────────────────
function renderVideoList() {
  const list = $('videoList');
  const empty = $('videoListEmpty');
  const ids = Object.keys(videos);

  if (ids.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    empty.style.display = '';
    return;
  }

  empty.style.display = 'none';
  list.innerHTML = '';
  for (const id of ids) {
    const v = videos[id];
    const numericId = Number(id);
    const isActive = numericId === activeId;

    const item = document.createElement('div');
    item.className = `video-item ${isActive ? 'active' : ''}`;
    item.addEventListener('click', () => selectVideo(numericId));

    const thumb = document.createElement('img');
    thumb.className = 'video-thumb';
    thumb.src = `/api/thumbnail?vid=${numericId}`;
    thumb.alt = '';
    thumb.loading = 'lazy';

    const info = document.createElement('div');
    info.className = 'video-item-info';

    const name = document.createElement('div');
    name.className = 'video-item-name';
    name.title = v.filename;
    name.textContent = v.filename;

    const meta = document.createElement('div');
    meta.className = 'video-item-meta';
    meta.textContent = `${v.width}×${v.height} · ${formatTime(v.duration)}`;

    info.appendChild(name);
    info.appendChild(meta);

    const removeBtn = document.createElement('button');
    removeBtn.className = 'video-item-remove';
    removeBtn.title = '移除';
    removeBtn.textContent = '✕';
    removeBtn.addEventListener('click', e => removeVideo(numericId, e));

    item.appendChild(thumb);
    item.appendChild(info);
    item.appendChild(removeBtn);
    list.appendChild(item);
  }
  list.appendChild(empty);
}

// ── Timeline ───────────────────────────────────
function tryNativeScrubPreview(t) {
  if (activeId === null) return false;
  if (!ensurePreviewVideoSource(activeId, { forceReload: previewVideoSourceError })) {
    if (previewVideoSourceError) return false;
  }
  if (previewVideo.readyState < 1) return false;
  try {
    previewVideo.currentTime = clampTime(t);
  } catch (e) {
    return false;
  }
  if (!scrubPreviewActive) {
    previewVideo.classList.add('visible');
    scrubPreviewActive = true;
  }
  return true;
}

function endScrubPreview() {
  if (!scrubPreviewActive) return;
  scrubPreviewActive = false;
  if (previewImg.src && previewImg.classList.contains('loaded')) {
    previewVideo.classList.remove('visible');
  }
}

function seekTo(t, options = {}) {
  const v = activeVideo();
  if (!v) return;
  if (isPlaying && !options.skipPause) {
    pausePlayback({ targetTime: t });
    return;
  }
  t = clampTime(t, v);
  updateTimelineUI(t);

  clearTimeout(seekDebounce);
  if (!options.fromVideoPlayback) {
    deferredPlaybackTime = null;
  }

  // While the user is actively dragging the timeline, skip the server round-trip
  // and let the <video> element show a fast, decoder-driven preview. The
  // high-quality frame is requested once after the scrub settles.
  if (isDragging && !options.fromVideoPlayback) {
    if (tryNativeScrubPreview(t)) {
      if (pendingFrameLoad) {
        pendingFrameLoad.abort();
        pendingFrameLoad = null;
      }
      return;
    }
  }

  const plan = getPreviewRequestPlan({
    isDragging,
    isPlaying: !!options.fromVideoPlayback,
    hasPendingLoad: !!pendingFrameLoad,
    useVideoPlayback: !!options.useVideoPlayback,
  });

  if (!plan.shouldLoadPreview) {
    return;
  }

  if (plan.defer) {
    deferredPlaybackTime = t;
    return;
  }

  if (plan.abortPending && pendingFrameLoad) {
    pendingFrameLoad.abort();
    pendingFrameLoad = null;
  }

  seekDebounce = setTimeout(() => {
    const loadId = ++frameLoadId;
    const controller = new AbortController();
    pendingFrameLoad = controller;
    const swapPreviewAfterLoad = !!options.swapPreviewAfterLoad;
    const url = `/api/frame?vid=${activeId}&t=${t.toFixed(3)}&_=${loadId}`;
    fetch(url, { signal: controller.signal })
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return res.blob();
      })
      .then(blob => {
        if (controller.signal.aborted || loadId !== frameLoadId) return;
        const previewUrl = URL.createObjectURL(blob);
        const previousUrl = currentPreviewUrl;
        currentPreviewUrl = previewUrl;
        previewImg.onload = () => {
          if (loadId === frameLoadId) {
            previewImg.classList.add('loaded');
            previewImg.classList.add('visible');
            if (swapPreviewAfterLoad) {
              showImagePreview();
            }
            endScrubPreview();
          }
          if (previousUrl) URL.revokeObjectURL(previousUrl);
        };
        previewImg.src = previewUrl;
        if (!swapPreviewAfterLoad && !scrubPreviewActive) {
          showImagePreview();
        }
      })
      .catch(err => {
        if (err.name !== 'AbortError' && loadId === frameLoadId) {
          console.error('Frame preview failed:', err);
        }
      })
      .finally(() => {
        if (pendingFrameLoad === controller) {
          pendingFrameLoad = null;
        }
        if (deferredPlaybackTime !== null) {
          const nextPlaybackTime = deferredPlaybackTime;
          deferredPlaybackTime = null;
          seekTo(nextPlaybackTime, { fromVideoPlayback: true });
        }
      });
  }, plan.debounceMs); // longer debounce while scrubbing
}

function stepFrame(dir) {
  const v = activeVideo();
  if (!v) return;
  seekTo(currentTime + dir / v.fps);
}

function getTimeFromEvent(e) {
  const v = activeVideo();
  const rect = timeline.getBoundingClientRect();
  const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  return pct * (v ? v.duration : 0);
}

timeline.addEventListener('mousedown', e => {
  if (!activeVideo()) return;
  isDragging = true;
  // Prime the <video> source immediately so native scrub works on the first move.
  ensurePreviewVideoSource(activeId, { forceReload: previewVideoSourceError });
  seekTo(getTimeFromEvent(e));
});

function flushDragMove() {
  dragMoveRafId = null;
  const e = pendingDragEvent;
  pendingDragEvent = null;
  if (!e) return;

  if (isDragging && activeVideo()) {
    seekTo(getTimeFromEvent(e));
  }
  if (activeVideo()) {
    const rect = timeline.getBoundingClientRect();
    const x = e.clientX - rect.left;
    if (x >= 0 && x <= rect.width) {
      timelineHover.textContent = formatTime((x / rect.width) * activeVideo().duration);
      timelineHover.style.left = x + 'px';
    }
  }
}

document.addEventListener('mousemove', e => {
  pendingDragEvent = e;
  if (dragMoveRafId === null) {
    dragMoveRafId = requestAnimationFrame(flushDragMove);
  }
});

document.addEventListener('mouseup', () => {
  if (!isDragging) return;
  isDragging = false;
  // Request one high-quality still frame to replace the <video> scrub preview.
  clearTimeout(scrubSettleTimer);
  scrubSettleTimer = setTimeout(() => {
    if (activeVideo() && !isPlaying) {
      seekTo(currentTime, { skipPause: true });
    }
  }, 60);
});

// ── Grab ───────────────────────────────────────
async function grabFrame() {
  if (!activeVideo()) return;
  $('grabBtn').disabled = true;
  $('grabBtn').textContent = '截取中...';

  try {
    const captureTime = getCaptureTime({
      currentTime,
      previewVideoTime: previewVideo.currentTime,
      isPlaying,
    });
    const res = await fetch('/api/grab', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ vid: activeId, time: captureTime })
    });
    const data = await res.json();
    if (data.error) {
      showToast(data.error, true);
    } else {
      showToast(`已保存 ${data.filename} (${data.size_kb} KB)`);
      $('grabCount').style.display = 'flex';
      $('grabCountText').textContent = `已截取 ${data.count} 帧`;
    }
  } catch (e) {
    showToast('截取失败', true);
  }

  $('grabBtn').disabled = false;
  $('grabBtn').textContent = '截取当前帧 (PNG)';
}

async function chooseSaveDir() {
  const res = await fetch('/api/choose_dir', { method: 'POST' });
  const data = await res.json();
  if (data.dir) $('saveDir').textContent = data.name || data.dir;
}

previewVideo.addEventListener('timeupdate', () => {
  if (isPlaying) {
    updateTimelineUI(previewVideo.currentTime);
  }
});

previewVideo.addEventListener('loadedmetadata', () => {
  previewVideoSourceError = false;
});

previewVideo.addEventListener('error', () => {
  previewVideoSourceError = true;
});

previewVideo.addEventListener('ended', () => {
  const v = activeVideo();
  pausePlayback({ targetTime: v ? v.duration : previewVideo.currentTime });
});

$('exposureSlider').addEventListener('input', e => {
  setExposure(e.target.value);
});

// ── Toast ──────────────────────────────────────
let toastTimer = null;
function showToast(msg, isError) {
  const t = $('toast');
  t.textContent = msg;
  t.style.background = isError ? 'rgba(239,68,68,0.15)' : 'rgba(52,211,153,0.15)';
  t.style.borderColor = isError ? 'rgba(239,68,68,0.3)' : 'rgba(52,211,153,0.3)';
  t.style.color = isError ? '#ef4444' : '#34d399';
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Keyboard ───────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { e.preventDefault(); stepFrame(-1); }
  if (e.key === 'ArrowRight') { e.preventDefault(); stepFrame(1); }
  if (e.key === ' ') { e.preventDefault(); togglePlayback(); }
  if (e.key === 'Enter') { e.preventDefault(); grabFrame(); }
  if ((e.metaKey || e.ctrlKey) && e.key === 'o') { e.preventDefault(); chooseFile(); }
});

// ── Drag & Drop ────────────────────────────────
function hasVideoFiles(dt) {
  return dt.types.includes('Files');
}

document.addEventListener('dragenter', e => {
  e.preventDefault();
  bodyDragCounter++;
  if (hasVideoFiles(e.dataTransfer)) {
    if (activeId !== null) {
      dragOverlay.classList.add('visible');
    } else {
      dropZone.classList.add('drag-over');
    }
  }
});

document.addEventListener('dragleave', e => {
  e.preventDefault();
  bodyDragCounter--;
  if (bodyDragCounter <= 0) {
    bodyDragCounter = 0;
    dragOverlay.classList.remove('visible');
    dropZone.classList.remove('drag-over');
  }
});

document.addEventListener('dragover', e => {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'copy';
});

document.addEventListener('drop', async e => {
  e.preventDefault();
  bodyDragCounter = 0;
  dragOverlay.classList.remove('visible');
  dropZone.classList.remove('drag-over');

  const files = e.dataTransfer.files;
  if (!files || files.length === 0) return;

  const videoExts = /\.(mp4|mov|mkv|avi|webm|m4v|flv|ts|mxf|prores)$/i;
  const videoFiles = [];
  for (const f of files) {
    if (f.type.startsWith('video/') || videoExts.test(f.name)) {
      videoFiles.push(f);
    }
  }

  if (videoFiles.length === 0) {
    showToast('没有识别到视频文件', true);
    return;
  }

  showProgress(`正在导入 ${videoFiles.length} 个视频...`, 30);
  const formData = new FormData();
  for (const file of videoFiles) {
    formData.append('files', file, file.name);
  }

  try {
    const res = await fetch('/api/upload', {
      method: 'POST',
      body: formData
    });
    const data = await res.json();
    hideProgress();

    if (data.error) {
      showToast(data.error, true);
      return;
    }

    if (data.added && data.added.length > 0) {
      for (const v of data.added) {
        videos[String(v.id)] = v;
      }
      const selectId = data.active !== null ? data.active : data.added[0].id;
      await selectVideo(selectId);
      renderVideoList();
      showToast(`已添加 ${data.added.length} 个视频`);
    } else {
      showToast('没有可导入的视频', true);
    }
  } catch (err) {
    hideProgress();
    showToast('导入失败: ' + err.message, true);
  }
});

// ── Init ───────────────────────────────────────
startHeartbeat();
window.addEventListener('beforeunload', () => {
  pingApp();
});

fetch('/api/state').then(r => r.json()).then(d => {
  $('saveDir').textContent = d.save_dir_name || '桌面';
});
applyPreviewExposure();
</script>
</body>
</html>
